{{- if .Values.nats.credsEnabled }}
# NATS credentials file, pulled from AWS Secrets Manager into a k8s Secret and
# mounted into the pod. The application reads it via NATS_CREDS_FILE. Only
# rendered when nats.credsEnabled is true.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "vehicle-triggers-api.fullname" . }}-nats-creds
  namespace: {{ .Release.Namespace }}
spec:
  data:
  - remoteRef:
      key: {{ .Values.nats.credsSecretKey }}
    secretKey: nats.creds
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager-secret-store
  target:
    name: {{ include "vehicle-triggers-api.fullname" . }}-nats-creds
    template:
      metadata: {}
{{- end }}
