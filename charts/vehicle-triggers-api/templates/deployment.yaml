apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vehicle-triggers-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vehicle-triggers-api.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "vehicle-triggers-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/envconfigmap.yaml") . | sha256sum }}
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "vehicle-triggers-api.selectorLabels" . | nindent 8 }}
    spec:
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            {{- include "vehicle-triggers-api.selectorLabels" . | nindent 12 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "vehicle-triggers-api.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      # The app tears the ingest->dispatch->audit->NATS pipeline down in
      # ordered phases on SIGTERM (drain consumers, then dispatcher queue,
      # then audit queue, then a 30s NATS connection close). That can exceed
      # the 30s k8s default, which would SIGKILL mid-drain and drop webhooks
      # that were already acked off JetStream. Give it room.
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 120 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ toYaml .Values.command | nindent 12 }}
          # NOTE: no preStop sleep hook - the runtime image is
          # gcr.io/distroless/static, which has no shell, so an exec hook
          # would fail. Endpoint-removal races are bounded by the readiness
          # probe; the app's SIGTERM handler drains in-flight work within
          # terminationGracePeriodSeconds above.
          envFrom:
          - configMapRef:
              name: {{ include "vehicle-triggers-api.fullname" . }}-config
          - secretRef:
              name: {{ include "vehicle-triggers-api.fullname" . }}-secret
          {{- if .Values.nats.credsEnabled }}
          volumeMounts:
          - name: nats-creds
            mountPath: {{ .Values.nats.credsMountPath }}
            readOnly: true
          {{- end }}
          ports:
{{ toYaml .Values.ports | indent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
            successThreshold: 1
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.nats.credsEnabled }}
      volumes:
      - name: nats-creds
        secret:
          secretName: {{ include "vehicle-triggers-api.fullname" . }}-nats-creds
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
