apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vehicle-triggers-api.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vehicle-triggers-api.labels" . | nindent 4 }}
data:
{{- range $key, $val := .Values.env }}
  {{ $key }} : {{ $val | quote}}
{{- end}}
{{- if .Values.nats.credsEnabled }}
  NATS_CREDS_FILE: {{ printf "%s/nats.creds" .Values.nats.credsMountPath | quote }}
{{- end}}